<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav>
        <h2>Flipkart</h2>
        <input type="text" id="search" placeholder="Search products...">
        <div class="cart" id="cart-btn" onclick="toggleCartMenu()">Cart 🛒 <span id="cart-count">0</span></div>
    </nav>

    <!-- Products -->
    <div class="products" id="product-list"></div>

    <!-- Cart Menu -->
    <div id="cart-menu" class="menu">
        <div class="menu-content">
            <span class="close" onclick="toggleCartMenu()">&times;</span>
            <h2>Shopping Cart</h2>
            <div id="cart-items"></div>
            <div id="cart-total">Total: ₹0</div>
            <button class="checkout-btn" onclick="openCheckout()">Proceed to Checkout</button>
        </div>
    </div>

    <!-- Checkout Menu -->
    <div id="checkout-menu" class="menu">
        <div class="menu-content checkout-content">
            <span class="close" onclick="closeCheckout()">&times;</span>
            <h2>Checkout</h2>
            <form id="checkout-form">
                <label>Full Name:</label>
                <input type="text" required placeholder="Enter your name">
                
                <label>Email:</label>
                <input type="email" required placeholder="Enter your email">
                
                <label>Address:</label>
                <textarea required placeholder="Enter delivery address"></textarea>
                
                <label>Phone:</label>
                <input type="tel" required placeholder="Enter phone number">
                
                <label>Payment Method:</label>
                <select required>
                    <option>Credit Card</option>
                    <option>Debit Card</option>
                    <option>UPI</option>
                    <option>Cash on Delivery</option>
                </select>
                
                <div id="checkout-total">Total: ₹0</div>
                <button type="button" class="checkout-btn" onclick="completeOrder()">Place Order</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
